name: Bug report
description: Report a reproducible problem in Game Screen Foundry.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Run npm run dev
        2. Load ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "node -v"
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Avoid posting private local paths, tokens, or proprietary assets.

