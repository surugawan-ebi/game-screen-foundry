name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Project loading
        - Screen assembly
        - Asset review
        - Regeneration queue
        - Imagegen workflow
        - Documentation
        - Other
    validations:
      required: true

