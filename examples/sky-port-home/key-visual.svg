<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">星港アトラス HOME キービジュアル</title>
  <desc id="desc">雲海に浮かぶ星港都市を背景に、上部ステータス、プロフィール、イベント、任務、主導線ボタン、補助導線、下部ナビまで載せた完成画面モック。</desc>
  <defs>
