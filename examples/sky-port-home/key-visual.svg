      <stop offset="0%" stop-color="#c7f6ff" />
      <stop offset="42%" stop-color="#78cfe2" />
      <stop offset="100%" stop-color="#24537a" />
    </linearGradient>
    <linearGradient id="cloudGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8ffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#d2eef7" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c4465" />
      <stop offset="100%" stop-color="#10273d" />
    </linearGradient>
    <linearGradient id="panelSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#295677" />
      <stop offset="100%" stop-color="#16324d" />
