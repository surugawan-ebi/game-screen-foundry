    <linearGradient id="goldSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffeaac" />
      <stop offset="100%" stop-color="#d8a148" />
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8de3ef" />
      <stop offset="100%" stop-color="#4db8ca" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#07131f" flood-opacity="0.38" />
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
